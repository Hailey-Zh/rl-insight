<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow-dark" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#17202a" />
    </marker>
    <marker id="arrow-metric" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f9d55" />
    </marker>
    <marker id="arrow-trace" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#7b3fe4" />
    </marker>
    <marker id="arrow-control" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569" />
    </marker>
    <style>
      .title { font: 700 28px Arial, Helvetica, sans-serif; fill: #0b1220; }
      .section { font: 700 21px Arial, Helvetica, sans-serif; fill: #0b1220; }
      .node-title { font: 700 17px Arial, Helvetica, sans-serif; fill: #0b1220; }
      .label { font: 500 15px Arial, Helvetica, sans-serif; fill: #0b1220; }
      .small { font: 500 13px Arial, Helvetica, sans-serif; fill: #334155; }
      .tiny { font: 500 12px Arial, Helvetica, sans-serif; fill: #475569; }
      .white { fill: #ffffff; }
      .outer { stroke: #111827; stroke-width: 4; fill: #ffffff; }
      .zone-blue { stroke: #2563eb; stroke-width: 3; stroke-dasharray: 14 10; fill: #f8fbff; }
      .zone-red { stroke: #ef4444; stroke-width: 3; stroke-dasharray: 14 10; fill: #fffafa; }
      .zone-green { stroke: #16a34a; stroke-width: 3; stroke-dasharray: 14 10; fill: #fbfffb; }
      .managed { stroke: #16a34a; stroke-width: 2.5; stroke-dasharray: 10 8; fill: #ffffff; }
      .box { stroke: #111827; stroke-width: 3; fill: #ffffff; }
      .green { fill: #16d46f; }
      .blue { fill: #3b8eea; }
      .yellow { fill: #fff4a8; }
      .pink { fill: #ffc0c7; }
      .cyan { fill: #6bd9d9; stroke: #111827; stroke-width: 3; }
      .server { fill: #e8f3ff; stroke: #2563eb; stroke-width: 3; }
      .service { fill: #dff7e8; stroke: #1f9d55; stroke-width: 3; }
      .tempo { fill: #efe7ff; stroke: #7b3fe4; stroke-width: 3; }
      .flow { stroke: #17202a; stroke-width: 3; fill: none; marker-end: url(#arrow-dark); }
      .metric { stroke: #1f9d55; stroke-width: 3; fill: none; marker-end: url(#arrow-metric); }
      .trace { stroke: #7b3fe4; stroke-width: 3; fill: none; marker-end: url(#arrow-trace); }
      .control { stroke: #475569; stroke-width: 3; stroke-dasharray: 8 7; fill: none; marker-end: url(#arrow-control); }
