  <text x="585" y="626" text-anchor="middle" class="small">send endpoints</text>

  <rect x="805" y="72" width="360" height="615" rx="10" class="zone-green" />
  <text x="985" y="108" text-anchor="middle" class="section">RL-Insight Server</text>

  <rect x="862" y="145" width="246" height="70" rx="9" class="server" />
